<style>
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#f5f4ee;
  --color-background-tertiary:#ebeae3;
  --color-background-info:#E6F1FB;
  --color-background-danger:#FCEBEB;
  --color-background-success:#EAF3DE;
  --color-background-warning:#FAEEDA;
  --color-text-primary:#191918;
  --color-text-secondary:#5F5E5A;
  --color-text-tertiary:#888780;
  --color-text-info:#185FA5;
  --color-text-danger:#A32D2D;
  --color-text-success:#3B6D11;
  --color-text-warning:#854F0B;
  --color-border-tertiary:rgba(0,0,0,0.1);
  --color-border-secondary:rgba(0,0,0,0.2);
  --color-border-primary:rgba(0,0,0,0.3);
  --color-border-info:#378ADD;
  --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --border-radius-md:8px;
  --border-radius-lg:12px;
}
@media (prefers-color-scheme: dark){
  :root{
    --color-background-primary:#1a1a1a;
    --color-background-secondary:#252521;
    --color-background-tertiary:#2f2f2a;
    --color-text-primary:#f0efea;
    --color-text-secondary:#b4b2a9;
    --color-text-tertiary:#888780;
    --color-border-tertiary:rgba(255,255,255,0.12);
    --color-border-secondary:rgba(255,255,255,0.22);
  }
}
body{margin:0;padding:1.5rem;background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans);max-width:1280px;margin:0 auto}

.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
</style>

<body>
<h1><i class="ti ti-solar-panel-2"></i> CRM Cotizaciones · Paneles Solares</h1>
<style>
.crm-app{font-family:var(--font-sans);color:var(--color-text-primary);padding:0}
.crm-tabs{display:flex;gap:4px;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:1.25rem}
.crm-tab{padding:10px 16px;font-size:14px;font-weight:500;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--color-text-secondary);cursor:pointer;transition:all .15s}
.crm-tab.active{color:var(--color-text-primary);border-bottom-color:var(--color-text-primary)}
.crm-tab:hover:not(.active){color:var(--color-text-primary)}
.crm-tab .badge{display:inline-block;margin-left:6px;background:var(--color-background-secondary);padding:1px 7px;border-radius:10px;font-size:11px;font-weight:500}
.crm-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:1.5rem}
.crm-metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:14px 16px}
.crm-metric .label{font-size:12px;color:var(--color-text-secondary);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.crm-metric .value{font-size:24px;font-weight:500;line-height:1.1}
.crm-metric .sub{font-size:11px;color:var(--color-text-tertiary);margin-top:4px}
.crm-metric.alert .value{color:var(--color-text-danger)}
.crm-metric.success .value{color:var(--color-text-success)}
.crm-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
.crm-toolbar input[type=text],.crm-toolbar select{height:32px;padding:0 10px;font-size:13px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
.crm-toolbar input[type=text]{flex:1;min-width:160px}
.crm-toolbar button{height:32px;padding:0 12px;font-size:13px;font-weight:500;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
.crm-toolbar button.primary{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.crm-toolbar button:hover{background:var(--color-background-secondary)}
.crm-toolbar button.primary:hover{opacity:.85;background:var(--color-text-primary)}
.kanban{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}
.kcol{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:10px;min-height:360px;display:flex;flex-direction:column}
.kcol.drag-over{outline:2px dashed var(--color-border-info);outline-offset:-2px}
.kcol-head{display:flex;justify-content:space-between;align-items:center;padding:0 4px 8px;font-size:12px;font-weight:500}
.kcol-head .count{background:var(--color-background-primary);padding:1px 8px;border-radius:10px;font-weight:500;font-size:11px}
.kcol[data-state=Nuevo] .dot{background:#888780}
.kcol[data-state="En contacto"] .dot{background:#378ADD}
.kcol[data-state=Interesado] .dot{background:#EF9F27}
.kcol[data-state=Vendida] .dot{background:#1D9E75}
.kcol[data-state=Perdida] .dot{background:#E24B4A}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
.kcards{display:flex;flex-direction:column;gap:6px;flex:1;overflow-y:auto;max-height:520px;padding-right:2px}
.kcard{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px;cursor:grab;font-size:12px;transition:border-color .15s}
.kcard:hover{border-color:var(--color-border-secondary)}
.kcard.dragging{opacity:.4}
.kcard .name{font-weight:500;font-size:13px;margin-bottom:4px;line-height:1.3}
.kcard .meta{display:flex;gap:6px;flex-wrap:wrap;font-size:11px;color:var(--color-text-secondary);align-items:center}
.kcard .pill{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:500;background:var(--color-background-secondary)}
.kcard .pill.warn{background:#FCEBEB;color:#791F1F}
.kcard .pill.ok{background:#EAF3DE;color:#27500A}
.kcard .pill.stale{background:#FAEEDA;color:#854F0B}
.kcard .pill.asesor{background:#EEEDFE;color:#3C3489}
.kcard .num{font-size:10px;color:var(--color-text-tertiary)}
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:10;border-radius:var(--border-radius-lg)}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);padding:1.25rem;width:92%;max-width:540px;max-height:84vh;overflow-y:auto;border:0.5px solid var(--color-border-tertiary)}
.modal h3{margin:0 0 1rem;font-size:18px;font-weight:500}
.modal .row{margin-bottom:12px}
.modal label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px;font-weight:500}
.modal input,.modal select,.modal textarea{width:100%;padding:8px 10px;font-size:13px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-family:inherit;box-sizing:border-box}
.modal textarea{resize:vertical;min-height:60px}
.modal .checkbox-row{display:flex;align-items:center;gap:8px;font-size:13px}
.modal .checkbox-row input{width:auto}
.modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;padding-top:1rem;border-top:0.5px solid var(--color-border-tertiary)}
.modal .actions button{padding:8px 16px;font-size:13px;font-weight:500;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
.modal .actions button.primary{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.modal .actions button.danger{color:var(--color-text-danger);border-color:var(--color-text-danger)}
.detail-section{margin-top:1rem;padding-top:1rem;border-top:0.5px solid var(--color-border-tertiary)}
.detail-section h4{margin:0 0 8px;font-size:14px;font-weight:500}
.coment{background:var(--color-background-secondary);padding:8px 10px;border-radius:var(--border-radius-md);margin-bottom:6px;font-size:13px}
.coment .head{display:flex;justify-content:space-between;font-size:11px;color:var(--color-text-secondary);margin-bottom:3px}
.coment .author{font-weight:500;color:var(--color-text-primary)}
.coment .text{line-height:1.5}
.empty{text-align:center;padding:2rem;color:var(--color-text-tertiary);font-size:13px}
.toast{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:var(--color-text-primary);color:var(--color-background-primary);padding:10px 16px;border-radius:var(--border-radius-md);font-size:13px;z-index:20;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.tab-content{display:none}
.tab-content.active{display:block}
.dashboard-charts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.chart-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem;min-height:240px}
.chart-card h4{margin:0 0 12px;font-size:14px;font-weight:500;color:var(--color-text-secondary)}
.bar-list{display:flex;flex-direction:column;gap:8px}
.bar-row{display:grid;grid-template-columns:80px 1fr 40px;align-items:center;gap:10px;font-size:12px}
.bar-row .lbl{color:var(--color-text-secondary)}
.bar-row .bar{height:18px;background:var(--color-background-secondary);border-radius:4px;overflow:hidden;position:relative}
.bar-row .fill{height:100%;background:#378ADD;border-radius:4px}
.bar-row .val{text-align:right;font-weight:500}
.alert-list{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto}
.alert-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);font-size:12px;cursor:pointer}
.alert-item:hover{background:var(--color-background-tertiary)}
.alert-item .who{font-weight:500}
.alert-item .when{color:var(--color-text-tertiary)}
.position-wrap{position:relative}
@media (max-width:680px){.kanban{grid-template-columns:1fr;}.dashboard-charts{grid-template-columns:1fr}}
</style>
<h2 class="sr-only">CRM de cotizaciones para paneles solares con tablero kanban, métricas en vivo y bitácora de comentarios</h2>

      <button id="btnExport"><i class="ti ti-download" aria-hidden="true"></i> Exportar CSV</button>
    </div>
    <div id="listaContainer"></div>
  </div>

  <div class="toast" id="toast"></div>
</div>

// Sincronización en tiempo real: cuando alguien del equipo edita, los demás ven el cambio
function subscribeToChanges(){
  if (!sbClient) return;
  sbClient.channel("cotizaciones-changes")
    .on("postgres_changes", { event: "*", schema: "public", table: "cotizaciones" }, (payload) => {
      if (payload.eventType === "INSERT") {
        if (!registros.find(r => r.id === payload.new.id)) registros.push(payload.new);
      } else if (payload.eventType === "UPDATE") {
        const idx = registros.findIndex(r => r.id === payload.new.id);
        if (idx >= 0) registros[idx] = payload.new;
      } else if (payload.eventType === "DELETE") {
        registros = registros.filter(r => r.id !== payload.old.id);
      }
      renderAll();
    })
    .subscribe();
}

// ==== Métricas ====
function calcMetrics(){
  const total=registros.length;
  const vendidas=registros.filter(r=>r.estado==="Vendida").length;
  const perdidas=registros.filter(r=>r.estado==="Perdida").length;
  const cerradas=vendidas+perdidas;
  const cierre=cerradas>0?Math.round(vendidas/cerradas*100):0;
  const sinRecibo=registros.filter(r=>!r.tieneRecibo&&!r.reciboNA&&r.estado!=="Vendida"&&r.estado!=="Perdida").length;
  const t=today();
  const respuestas=registros.filter(r=>r.fechaRecepcion&&r.fechaUltimoContacto).map(r=>daysBetween(r.fechaRecepcion,r.fechaUltimoContacto)).filter(n=>n!==null&&n>=0);
  const promResp=respuestas.length>0?Math.round(respuestas.reduce((a,b)=>a+b,0)/respuestas.length):0;
  const stale=registros.filter(r=>{
    if(r.estado==="Vendida"||r.estado==="Perdida")return false;
    const ref=r.fechaUltimoContacto||r.fechaRecepcion;
    if(!ref)return false;
    return daysBetween(ref,t)>=7;
  });
  const sinAtender=registros.filter(r=>!r.asesor && r.estado!=="Vendida" && r.estado!=="Perdida").length;
  return {total,vendidas,perdidas,cierre,sinRecibo,promResp,stale,sinAtender};
}

function renderCard(r){
  const t=today();
  const ref=r.fechaUltimoContacto||r.fechaRecepcion;
  const dias=ref?daysBetween(ref,t):null;
  const stale=dias!==null && dias>=7 && r.estado!=="Vendida" && r.estado!=="Perdida";
  const sinRecibo=!r.tieneRecibo && !r.reciboNA;
  return `<div class="kcard" draggable="true" data-id="${r.id}">
    <div class="num">#${r.num}</div>
    <div class="name">${escapeHtml(r.cliente)}</div>
    <div class="meta">
      ${r.asesor?`<span class="pill asesor">${r.asesor}</span>`:''}
      ${sinRecibo?'<span class="pill warn"><i class="ti ti-receipt-off" style="font-size:10px"></i> Sin recibo</span>':''}
      ${stale?`<span class="pill stale"><i class="ti ti-clock" style="font-size:10px"></i> ${dias}d</span>`:''}
      ${r.cotizacionLista?'<span class="pill ok"><i class="ti ti-check" style="font-size:10px"></i> Cotizado</span>':''}
    </div>
  </div>`;
}

function escapeHtml(s){if(!s)return "";return s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

function attachDnD(){
  document.querySelectorAll(".kcard").forEach(card=>{
    card.addEventListener("dragstart",e=>{
      card.classList.add("dragging");
      e.dataTransfer.setData("text/plain",card.dataset.id);
      e.dataTransfer.effectAllowed="move";
    });
    card.addEventListener("dragend",()=>card.classList.remove("dragging"));
  });
  document.querySelectorAll(".kcol").forEach(col=>{
    col.addEventListener("dragover",e=>{e.preventDefault();col.classList.add("drag-over");});
    col.addEventListener("dragleave",()=>col.classList.remove("drag-over"));
    col.addEventListener("drop",async e=>{
      e.preventDefault();
      col.classList.remove("drag-over");
      const id=e.dataTransfer.getData("text/plain");
      const newState=col.dataset.state;
      const r=registros.find(x=>x.id===id);
      if(!r || r.estado===newState)return;
      const oldState=r.estado;
      r.estado=newState;
      r.fechaUltimoContacto=today();
      r.comentarios=r.comentarios||[];
      r.comentarios.push({fecha:today(),autor:"Sistema",texto:`Movido de "${oldState}" a "${newState}"`});
      await saveData();
      renderAll();
      showToast(`${r.cliente} → ${newState}`);
    });
  });
}

function attachCardClicks(){
  document.querySelectorAll(".kcard").forEach(card=>{
    card.addEventListener("click",e=>{

      openDetail(card.dataset.id);

        const stale=dias!==null && dias>=7 && r.estado!=="Vendida" && r.estado!=="Perdida";
        return `<tr style="border-top:0.5px solid var(--color-border-tertiary);cursor:pointer" data-id="${r.id}" class="lrow">
          <td style="padding:10px;color:var(--color-text-tertiary)">${r.num}</td>
          <td style="padding:10px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(r.cliente)}</td>
          <td style="padding:10px;color:var(--color-text-secondary)">${fmtPhone(r.telefono)}</td>
          <td style="padding:10px">${r.asesor||'<span style="color:var(--color-text-tertiary)">—</span>'}</td>
          <td style="padding:10px"><span class="pill" style="background:var(--color-background-secondary);padding:2px 8px;border-radius:8px;font-size:11px">${r.estado}</span></td>
          <td style="padding:10px;color:${stale?'var(--color-text-danger)':'var(--color-text-secondary)'}">${dias!==null?dias+'d':'—'}</td>
        </tr>`;
      }).join("")}</tbody>
    </table>
  </div>`;
  c.querySelectorAll(".lrow").forEach(r=>r.onclick=()=>openDetail(r.dataset.id));
}

// ==== Modales: Nuevo + Detalle ====
function openNew(){
  editingId=null;
  showModal(`
    <h3>Nueva cotización</h3>
    <div class="row"><label>Nombre del cliente *</label><input type="text" id="m_cliente" placeholder="Ej. Juan Pérez" /></div>
    <div class="row"><label>Teléfono</label><input type="tel" id="m_telefono" placeholder="833 xxx xxxx" /></div>
    <div class="row"><label>Fecha de recepción</label><input type="date" id="m_fecha" value="${today()}" /></div>
    <div class="row"><label>Asesor que atiende</label>
      <select id="m_asesor">
        <option value="">Sin asignar</option>
        <option>Ana</option><option>DCA</option><option>GCA</option><option>Daniel</option><option>German</option>
      </select>
    </div>
    <div class="row checkbox-row"><input type="checkbox" id="m_recibo" /><label for="m_recibo" style="margin:0">Tiene recibo de luz</label></div>
    <div class="row"><label>Comentario inicial</label><textarea id="m_coment" placeholder="Detalles del cliente: paneles solicitados, observaciones..."></textarea></div>
    <div class="actions">
      <button onclick="closeModal()">Cancelar</button>
      <button class="primary" onclick="saveNew()">Guardar</button>
    </div>
  `);
}

async function saveNew(){
  const cliente=document.getElementById("m_cliente").value.trim();
  if(!cliente){showToast("El nombre es obligatorio");return;}
  const tel=document.getElementById("m_telefono").value.trim();
  const fecha=document.getElementById("m_fecha").value || today();
  const asesor=document.getElementById("m_asesor").value;
  const recibo=document.getElementById("m_recibo").checked;
  const coment=document.getElementById("m_coment").value.trim();
  const maxNum=registros.reduce((m,r)=>Math.max(m,r.num||0),0);
  const nuevo={
    id:`sol_${maxNum+1}_${Date.now()}`,
    num:maxNum+1,
    cliente, telefono:tel.replace(/\D/g,""),
    fechaRecepcion:fecha,
    tieneRecibo:recibo, reciboNA:false,
    cotizacionLista:false,
    asesor, estado:"Nuevo",
    fechaUltimoContacto:fecha,
    comentarios: coment ? [{fecha,autor:asesor||"Sistema",texto:coment}] : []
  };
  registros.push(nuevo);
  await saveData();
  closeModal();
  renderAll();
  showToast(`#${nuevo.num} ${cliente} agregado`);
}

function openDetail(id){
  const r=registros.find(x=>x.id===id);
  if(!r)return;
  detailId=id;
  const t=today();
  const ref=r.fechaUltimoContacto||r.fechaRecepcion;
  const dias=ref?daysBetween(ref,t):null;
  showModal(`
    <h3>#${r.num} · ${escapeHtml(r.cliente)}</h3>
    <div class="row"><label>Cliente</label><input type="text" id="d_cliente" value="${escapeHtml(r.cliente)}" /></div>
    <div class="row" style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div><label>Teléfono</label><input type="tel" id="d_telefono" value="${r.telefono||''}" /></div>
      <div><label>Asesor</label>
        <select id="d_asesor">
          <option value="">Sin asignar</option>
          ${["Ana","DCA","GCA","Daniel","German"].map(a=>`<option ${r.asesor===a?'selected':''}>${a}</option>`).join("")}
          ${r.asesor && !["Ana","DCA","GCA","Daniel","German"].includes(r.asesor)?`<option selected>${r.asesor}</option>`:''}
        </select>
      </div>
    </div>
    <div class="row" style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div><label>Estado</label>
        <select id="d_estado">${ESTADOS.map(e=>`<option ${r.estado===e?'selected':''}>${e}</option>`).join("")}</select>
      </div>
      <div><label>Recepción</label><input type="date" id="d_fecha" value="${r.fechaRecepcion||''}" /></div>
    </div>
    <div class="row" style="display:flex;gap:14px;font-size:13px">
      <label class="checkbox-row" style="margin:0"><input type="checkbox" id="d_recibo" ${r.tieneRecibo?'checked':''}/> Tiene recibo</label>
      <label class="checkbox-row" style="margin:0"><input type="checkbox" id="d_cot" ${r.cotizacionLista?'checked':''}/> Cotización lista</label>
    </div>

    <div class="detail-section">
      <h4>Bitácora de seguimiento</h4>
      <div class="row" style="display:grid;grid-template-columns:90px 1fr auto;gap:6px;margin-bottom:6px">
        <select id="c_autor" style="font-size:12px;padding:6px 8px">
          ${["Ana","DCA","GCA","Daniel","German","Sistema"].map(a=>`<option>${a}</option>`).join("")}
        </select>
        <input type="text" id="c_texto" placeholder="Nuevo comentario..." style="font-size:12px;padding:6px 8px" />
        <button onclick="addComment()" style="padding:6px 10px;font-size:12px;font-weight:500;background:var(--color-text-primary);color:var(--color-background-primary);border:none;border-radius:var(--border-radius-md);cursor:pointer">Añadir</button>
      </div>
      <div id="comentList">${(r.comentarios||[]).slice().reverse().map(c=>`
        <div class="coment">
          <div class="head"><span class="author">${c.autor}</span><span>${fmtDate(c.fecha)}</span></div>
          <div class="text">${escapeHtml(c.texto)}</div>
        </div>
      `).join("")||'<div class="empty" style="padding:1rem">Sin comentarios todavía</div>'}</div>
    </div>

    <div style="margin-top:1rem;padding:10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);font-size:12px;color:var(--color-text-secondary);line-height:1.6">
      <i class="ti ti-info-circle" aria-hidden="true"></i> Recepción: ${fmtDate(r.fechaRecepcion)} · Último contacto: ${fmtDate(r.fechaUltimoContacto)}${dias!==null?` (hace ${dias} días)`:''}
    </div>

    <div class="actions">
      <button class="danger" onclick="deleteRecord()"><i class="ti ti-trash" aria-hidden="true"></i> Eliminar</button>
      <button onclick="closeModal()">Cerrar</button>
      <button class="primary" onclick="saveDetail()">Guardar cambios</button>
    </div>
  `);
}

async function addComment(){
  const r=registros.find(x=>x.id===detailId);
  if(!r)return;
  const autor=document.getElementById("c_autor").value;
  const texto=document.getElementById("c_texto").value.trim();
  if(!texto)return;
  r.comentarios=r.comentarios||[];
  r.comentarios.push({fecha:today(),autor,texto});
  r.fechaUltimoContacto=today();
  await saveData();
  // Asegurarse de actualizar tablero atrás
  const wasOpen=detailId;
  openDetail(wasOpen);
  renderAll();
  showToast("Comentario agregado");
}

async function saveDetail(){
  const r=registros.find(x=>x.id===detailId);
  if(!r)return;
  const newCliente=document.getElementById("d_cliente").value.trim();
  if(!newCliente){showToast("Cliente obligatorio");return;}
  r.cliente=newCliente;
  r.telefono=document.getElementById("d_telefono").value.trim().replace(/\D/g,"");
  r.asesor=document.getElementById("d_asesor").value;
  const newEstado=document.getElementById("d_estado").value;
  if(newEstado!==r.estado){
    r.comentarios=r.comentarios||[];
    r.comentarios.push({fecha:today(),autor:"Sistema",texto:`Movido de "${r.estado}" a "${newEstado}"`});
    r.fechaUltimoContacto=today();
  }
  r.estado=newEstado;
  r.fechaRecepcion=document.getElementById("d_fecha").value;
  r.tieneRecibo=document.getElementById("d_recibo").checked;
  if(r.tieneRecibo)r.reciboNA=false;
  r.cotizacionLista=document.getElementById("d_cot").checked;
  await saveData();
  closeModal();
  renderAll();
  showToast("Cambios guardados");
}

async function deleteRecord(){
  if(!confirm("¿Eliminar esta cotización? No se puede deshacer."))return;
  registros=registros.filter(x=>x.id!==detailId);
  await saveData();
  closeModal();
  renderAll();
  showToast("Cotización eliminada");
}

function showModal(html){
  let ov=document.getElementById("modalOverlay");
  if(!ov){
    ov=document.createElement("div");
    ov.className="modal-overlay";
    ov.id="modalOverlay";
    ov.innerHTML='<div class="modal" id="modalBox"></div>';
    ov.onclick=(e)=>{if(e.target===ov)closeModal();};
    document.getElementById("app").appendChild(ov);
  }
  document.getElementById("modalBox").innerHTML=html;
}
function closeModal(){
  const ov=document.getElementById("modalOverlay");
  if(ov)ov.remove();
  detailId=null;editingId=null;
}

// ==== Export CSV ====
function exportCSV(){
  const rows=[["#","Cliente","Telefono","Asesor","Estado","Recepcion","UltimoContacto","TieneRecibo","CotizacionLista","Comentarios"]];
  registros.sort((a,b)=>a.num-b.num).forEach(r=>{
    const com=(r.comentarios||[]).map(c=>`[${c.fecha} ${c.autor}] ${c.texto}`).join(" | ");
    rows.push([r.num,r.cliente,r.telefono,r.asesor,r.estado,r.fechaRecepcion||"",r.fechaUltimoContacto||"",r.tieneRecibo?"SI":(r.reciboNA?"N/A":"NO"),r.cotizacionLista?"SI":"NO",com]);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=`cotizaciones_${today()}.csv`;a.click();
  URL.revokeObjectURL(url);
  showToast("CSV descargado");
}

// ==== Tabs ====
function switchView(v){
  document.querySelectorAll(".crm-tab").forEach(t=>t.classList.toggle("active",t.dataset.view===v));
  document.querySelectorAll(".tab-content").forEach(c=>c.classList.toggle("active",c.id===`view-${v}`));
  if(v==="dashboard"){renderMetrics();renderCharts();}
  if(v==="kanban")renderKanban();
  if(v==="lista")renderLista();
}

function renderAll(){
  renderMetrics();
  renderCharts();
  renderKanban();
  renderLista();
}

// ==== Init ====
async function init(){
  await loadData();
  renderAll();
  document.querySelectorAll(".crm-tab").forEach(t=>t.onclick=()=>switchView(t.dataset.view));
  document.getElementById("btnNuevo").onclick=openNew;
  document.getElementById("btnExport").onclick=exportCSV;
  document.getElementById("searchKanban").oninput=renderKanban;
  document.getElementById("filterAsesor").onchange=renderKanban;
  document.getElementById("searchLista").oninput=renderLista;
  document.getElementById("filterEstado").onchange=renderLista;
}
window.addComment=addComment;window.saveDetail=saveDetail;window.deleteRecord=deleteRecord;window.saveNew=saveNew;window.closeModal=closeModal;

function waitForSupabase(tries=0){
  if(typeof window.supabase !== "undefined"){
    if(initSupabase()){
      loadData().then(()=>{ renderAll(); subscribeToChanges(); });
    }
  } else if(tries < 20){
    setTimeout(()=>waitForSupabase(tries+1), 150);
  } else {
    document.body.innerHTML="<p style='padding:2rem;font-family:sans-serif'>Error: no se pudo cargar Supabase. Recarga la página.</p>";
  }
}
document.addEventListener("DOMContentLoaded", ()=>waitForSupabase());
</script>
